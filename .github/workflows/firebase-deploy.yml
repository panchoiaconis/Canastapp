name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # IMPORTANTE: Si tu web es solo HTML/CSS/JS (sin React/Vue), 
      # borra la siguiente línea (run: npm ci...). Si la dejas y no tienes
      # un archivo package.json, el despliegue fallará siempre.
    
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROYECTO }}'
          channelId: live
          projectId: CanastAPP
